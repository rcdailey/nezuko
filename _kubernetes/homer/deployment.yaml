apiVersion: apps/v1
kind: Deployment
metadata:
  name: homer
spec:
  selector:
    matchLabels:
      app: homer
  template:
    metadata:
      labels:
        app: homer
    spec:
      containers:
      - name: homer
        image: b4bz/homer:v25.05.2
        resources:
          requests:
            memory: 64Mi
            cpu: 250m
          limits:
            memory: 128Mi
            cpu: 500m
        ports:
        - containerPort: 8080
        envFrom:
        - configMapRef:
            name: homer-config
        volumeMounts:
        - name: assets
          mountPath: /www/assets
        securityContext:
          runAsUser: 1000
          runAsGroup: 1000
      volumes:
      - name: assets
        persistentVolumeClaim:
          claimName: homer-assets
      restartPolicy: Always
